<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auto-Announce</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Auto-Announce</h1>
        <p>Host stream controller</p>
      </div>
      <div class="status-pill" id="runState">Stopped</div>
    </header>

    <section class="panel controls">
      <form id="streamForm">
        <label>
          Receiver IP
          <input id="targetHost" name="targetHost" value="127.0.0.1" autocomplete="off">
        </label>
        <label>
          Audio Port
          <input id="targetPort" name="targetPort" type="number" min="1" max="65535" value="41771">
        </label>
        <label>
          Zone
          <input id="zoneId" name="zoneId" type="number" min="1" max="65535" value="1">
        </label>
        <label>
          Stream
          <input id="streamId" name="streamId" type="number" min="1" max="65535" value="1">
        </label>
        <label>
          Tone Hz
          <input id="frequencyHz" name="frequencyHz" type="number" min="20" max="20000" value="880">
        </label>
        <label>
          Gain
          <input id="gain" name="gain" type="number" min="0" max="1" step="0.01" value="0.20">
        </label>
        <div class="button-row">
          <button type="submit" class="primary">Start UDP Audio</button>
          <button type="button" id="stopBtn">Stop</button>
        </div>
      </form>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Stream</h2>
        <dl id="streamStats"></dl>
      </article>
      <article class="panel">
        <h2>Receiver Telemetry</h2>
        <dl id="telemetryStats"></dl>
      </article>
    </section>

    <section class="panel">
      <h2>Audio Source</h2>
      <div id="devices" class="devices"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
